spec: rms/module/v0.1

module:
  name: payments
  version: 1.0.0
  kind: bounded-context
  purpose: Own payment authorization, capture, refund, and provider reconciliation

profiles:
  - core
  - stateful
  - distributed
  - boundary

owns:
  concepts:
    - Payment
    - Authorization
    - Capture
    - Refund
  data:
    - payment-ledger
  identities:
    - payment-id
    - payment-operation-id
  decisions:
    - capture-eligibility
    - refund-eligibility

provides:
  commands:
    - name: authorize-payment
      contract: contracts/authorize-payment.v1.yaml
    - name: capture-payment
      contract: contracts/capture-payment.v1.yaml
    - name: refund-payment
      contract: contracts/refund-payment.v1.yaml
  queries:
    - name: get-payment-status
      contract: contracts/get-payment-status.v1.yaml
  events:
    - name: payment-outcome
      contract: contracts/payment-outcome.v1.yaml
  capabilities: []

requires:
  modules: []
  capabilities:
    - name: payment-provider
      contract: contracts/payment-provider.yaml
    - name: durable-store
      contract: contracts/durable-store.yaml

invariants:
  - id: capture-requires-authorization
    statement: Capture is accepted only for an active authorization.
    enforced_by: payment-aggregate
    verified_by: verification/laws/capture_requires_authorization
  - id: refund-within-capture
    statement: Total accepted refunds never exceed captured value.
    enforced_by: payment-aggregate
    verified_by: verification/laws/refund_within_capture

effects:
  - name: durable-store
    kind: durable-storage
    capability: durable-store
    semantics:
      consistency: per-payment
      migration: versioned
  - name: payment-provider
    kind: external-financial-operation
    capability: payment-provider
    semantics:
      idempotency: payment-operation-id
      ordering: per-payment
      consistency: external-eventual
      timeout: unknown-outcome
      retry: same-idempotency-key-only
      compensation: refund-payment
      reconciliation: required

state:
  model: docs/payment-lifecycle.md
  consistency_boundary: one-payment
  concurrency: optimistic-version
  persistence: durable-ledger
  migration_policy: versioned

boundary:
  accepted_contracts:
    - authorize-payment.v1
    - capture-payment.v1
    - refund-payment.v1
  validation: reject-before-domain-entry
  authorization: service-or-operator-scope
  malformed_input: reject-with-stable-error
  deprecation: versioned-contract-policy

compatibility:
  policy: backward-compatible-within-major
  events: versioned-integration-events
  stored_state: explicit-migration

verification:
  laws:
    - verification/laws
  contracts:
    - verification/contracts
  scenarios:
    - verification/scenarios
  boundaries:
    - verification/boundaries

operations:
  observability:
    correlation: payment-id
    causation: payment-operation-id
  runtime_checks:
    - ops/checks/payment-invariants
  reconciliation:
    - ops/reconcile/payment-provider
  runbooks:
    - ops/runbooks/unknown-payment-outcome.md

x-change-protocols:
  - id: payment-outcome-contract-change
    applies_when: Adding, removing, renaming, or changing the public meaning of a payment outcome.
    classification: public-contract-or-domain-policy
    references:
      contracts:
        - contracts/payment-outcome.v1.yaml
      docs:
        - docs/payment-lifecycle.md
      evidence:
        - verification/laws
        - verification/scenarios
      operations:
        - ops/runbooks/unknown-payment-outcome.md
    affected_surfaces:
      invariants:
        - capture-requires-authorization
        - refund-within-capture
      effects:
        - payment-provider
      compatibility:
        - public event meaning
        - provider reconciliation behavior
    required_updates:
      - Update the public event contract before changing implementation behavior.
      - Update lifecycle documentation when the outcome changes payment state meaning.
      - Add or update negative evidence for impossible variants and illegal transitions.
      - Reclassify compatibility impact for active consumers before preserving the same version.
    verify:
      - rms validate --root .
      - rms compose --root .
  - id: payment-provider-effect-change
    applies_when: Changing timeout, retry, idempotency, ordering, compensation, or reconciliation behavior for provider calls.
    classification: dependency-effect-or-recovery-change
    references:
      contracts:
        - contracts/payment-provider.yaml
      evidence:
        - verification/scenarios/unknown_outcome_reconciliation
      operations:
        - ops/reconcile/payment-provider
        - ops/runbooks/unknown-payment-outcome.md
    affected_surfaces:
      effects:
        - payment-provider
      recovery_paths:
        - unknown-outcome reconciliation
      compatibility:
        - distributed operational semantics
    required_updates:
      - Update effect semantics and the provider capability contract before relying on new behavior.
      - Keep retries bound to the same payment-operation-id unless the public contract changes.
      - Update reconciliation or runbook evidence when external truth can diverge.
    verify:
      - rms validate --root .
      - rms compose --root .
