spec: rms/implementation/v0.1

module: rust-example
binding: rust

source:
  root: .
  public_entrypoint: src/lib.rs

commands:
  build: cargo build --manifest-path Cargo.toml
  verify: cargo test --manifest-path Cargo.toml
  format: cargo fmt --manifest-path Cargo.toml --check

toolchain:
  cargo_manifest: Cargo.toml
  package: rms-rust-example

dependencies:
  allowed_external_crates:
    - serde

architecture:
  public_modules:
    - widget

semantic_functions:
  - id: widget-constructor
    symbol: Widget::new
    kind: constructor
    purity: pure
    discharges:
      invariants:
        - accepted-widget-has-name
    assumptions:
      ensures:
        - when output is Some, output.name().trim() is not empty
    evidence:
      laws:
        - verification/laws/accepted_widget_has_name
      scenarios:
        - verification/scenarios/widget_acceptance
  - id: describe-widget-query
    symbol: describe_widget
    kind: projector
    purity: pure
    discharges:
      contracts:
        - contracts/describe-widget.v1.yaml
      invariants:
        - accepted-widget-has-name
    assumptions:
      requires:
        - widget was constructed through Widget::new
      ensures:
        - output == widget.name()
    evidence:
      contracts:
        - verification/contracts/describe_widget_contract
