name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Validate examples
        run: |
          cargo run -p rms -- validate --root examples/minimal
          cargo run -p rms -- validate --root examples/commerce
          cargo run -p rms -- validate --root examples/rust
          cargo run -p rms -- validate --root examples/swift
      - name: Check compatibility smoke test
        run: cargo run -p rms -- check-compat examples/rust/module.yaml examples/rust/module.yaml
      - name: Check composition smoke tests
        run: |
          cargo run -p rms -- compose --root examples/minimal
          cargo run -p rms -- compose --root examples/rust
          cargo run -p rms -- compose --root examples/swift
      - name: Package smoke test
        run: |
          tmpdir="$(mktemp -d)"
          cargo run -p rms -- package examples/rust/module.yaml --output "$tmpdir/rust-example.rms"
          test -f "$tmpdir/rust-example.rms/PACKAGE.json"
          test -f "$tmpdir/rust-example.rms/conformance-report.json"
          cargo run -p rms -- verify-package "$tmpdir/rust-example.rms"
      - name: Validate scaffold roundtrip
        run: |
          tmpdir="$(mktemp -d)"
          cargo run -p rms --locked -- init "$tmpdir/app" \
            --name app \
            --purpose "Try RMS" \
            --context core
          cargo run -p rms --locked -- add-module "$tmpdir/app/modules/widget" \
            --name widget \
            --purpose "Own widgets" \
            --kind library \
            --binding rust
          cargo run -p rms --locked -- add-module "$tmpdir/app/modules/swift-widget" \
            --name swift-widget \
            --purpose "Own Swift widgets" \
            --kind library \
            --binding swift
          cargo run -p rms --locked -- validate --root "$tmpdir/app"
          cargo run -p rms --locked -- compose --root "$tmpdir/app"
          cargo generate-lockfile --manifest-path "$tmpdir/app/modules/widget/Cargo.toml"
          cargo test --manifest-path "$tmpdir/app/modules/widget/Cargo.toml" --locked
      - name: Test Rust binding example
        run: cargo test --manifest-path examples/rust/Cargo.toml --locked
