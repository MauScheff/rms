name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check tag version
        run: |
          set -euo pipefail
          crate_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; data = json.load(sys.stdin); print(next(package["version"] for package in data["packages"] if package["name"] == "rms"))')"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$crate_version" = "$tag_version"
      - name: RMS release check
        run: cargo run -p rms --locked -- release check --root .

  source-package:
    needs: release-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Package source crate
        run: |
          set -euo pipefail
          cargo package --manifest-path tooling/rust/rms/Cargo.toml --locked
          mkdir -p dist
          cp target/package/rms-*.crate dist/
          (cd dist && shasum -a 256 rms-*.crate > "rms-${GITHUB_REF_NAME}-crate.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: rms-${{ github.ref_name }}-crate
          path: dist/*

  binary-archives:
    needs: release-check
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release -p rms --locked
      - name: Archive binary
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          archive="rms-${GITHUB_REF_NAME}-${RUNNER_OS}-${RUNNER_ARCH}.tar.gz"
          mkdir -p dist/stage
          cp target/release/rms dist/stage/rms
          cp README.md LICENSE RELEASE.md dist/stage/
          tar -C dist/stage -czf "dist/${archive}" .
          (cd dist && shasum -a 256 "${archive}" > "${archive}.sha256")
      - name: Archive binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "rms-$env:GITHUB_REF_NAME-$env:RUNNER_OS-$env:RUNNER_ARCH.zip"
          New-Item -ItemType Directory -Force dist/stage | Out-Null
          Copy-Item target/release/rms.exe dist/stage/rms.exe
          Copy-Item README.md,LICENSE,RELEASE.md dist/stage/
          Compress-Archive -Path dist/stage/* -DestinationPath "dist/$archive"
          $hash = Get-FileHash "dist/$archive" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $archive" | Out-File -Encoding ascii "dist/$archive.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: rms-${{ github.ref_name }}-${{ runner.os }}-${{ runner.arch }}
          path: dist/*

  publish:
    needs:
      - source-package
      - binary-archives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
          fi
