spec: rms/contract/v0.1
name: verify-implementation
version: 1
kind: command
meaning: Run the native verification command declared by an RMS implementation binding.
preconditions:
  - id: implementation-declares-verify
    statement: The implementation binding declares commands.verify.
postconditions:
  - id: native-command-result-preserved
    statement: The CLI exits with an error when the declared verification command fails.
failure_categories:
  - id: missing-verify-command
    statement: The implementation binding does not declare commands.verify.
  - id: verification-failed
    statement: The declared verification command exits unsuccessfully.
compatibility:
  policy: backward-compatible-within-major
