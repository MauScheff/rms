spec: rms/contract/v0.1
name: implement-module-workbench
version: 1
kind: command
meaning: Render an advisory RMS implementation prompt for a requested module change.
preconditions:
  - id: task-supplied
    statement: The requested implementation change is supplied as task text.
  - id: target-module-readable
    statement: The target module manifest is readable and parseable.
postconditions:
  - id: implement-prompt-classifies-change
    statement: The prompt asks the reviewer or agent to restate the outcome, classify the change, identify affected RMS surfaces, and preserve the owning module boundary.
  - id: public-meaning-updates-first
    statement: The prompt requires public contracts or manifests to be updated before implementation when public meaning changes.
  - id: implementation-is-advisory
    statement: The command renders or executes guidance and does not itself edit source files.
  - id: implement-provider-execution-is-optional
    statement: Provider-backed implementation guidance is opt-in and must preserve the rendered prompt and provider response as a run record.
failure_categories:
  - id: missing-task
    statement: No implementation task was supplied.
  - id: provider-unavailable
    statement: The requested provider command cannot be started or exits unsuccessfully.
compatibility:
  policy: backward-compatible-within-major
