spec: rms/contract/v0.1
name: build-context-packet
version: 1
kind: command
meaning: Build a bounded task packet for humans or agents from the target module and canonical RMS references.
preconditions:
  - id: target-module-readable
    statement: The target module manifest is readable and parseable.
postconditions:
  - id: packet-is-bounded
    statement: The packet names canonical files, public references, and working rules without reading unrelated implementation by default.
compatibility:
  policy: backward-compatible-within-major
