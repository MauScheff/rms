<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RMS Atlas</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --soft-ink: #3f4b56;
      --muted: #6b7480;
      --quiet: #8a949f;
      --line: #dce1e6;
      --surface: #ffffff;
      --field: #f5f6f8;
      --accent: #0f766e;
      --accent-soft: #e8f4f1;
      --gap: #a84d32;
      --gap-soft: #fff3ee;
      --rule: #4f63ad;
      --rule-soft: #eef1fb;
      --module: #665b2b;
      --module-soft: #f4efd9;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      overflow: hidden;
      color: var(--ink);
      background: var(--field);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input {
      font: inherit;
      color: inherit;
    }
    button { cursor: pointer; }
    .app {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding: 18px 24px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1, h2, h3 { letter-spacing: 0; }
    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
    }
    .purpose {
      max-width: 78ch;
      margin: 8px 0 0;
      color: var(--soft-ink);
    }
    .source-summary {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .source-summary strong {
      color: var(--ink);
      font-weight: 760;
    }
    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px minmax(420px, 1fr) 360px;
      background: var(--field);
    }
    .entry-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 12px;
      padding: 16px;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid var(--line);
    }
    .entry-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .entry-head .eyebrow {
      margin: 0;
    }
    .entry-count {
      color: var(--quiet);
      font-size: 12px;
      font-weight: 700;
    }
    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }
    input[type="search"] {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      outline: none;
    }
    input[type="search"]:focus {
      border-color: rgba(15,118,110,.55);
      box-shadow: 0 0 0 3px rgba(15,118,110,.08);
    }
    .button {
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .button:hover {
      border-color: rgba(15,118,110,.55);
      color: var(--accent);
    }
    .trace-tabs {
      min-height: 0;
      display: grid;
      align-content: start;
      gap: 4px;
      overflow: auto;
    }
    .trace-tab {
      width: 100%;
      padding: 10px 10px 10px 12px;
      border: 0;
      border-left: 3px solid transparent;
      border-radius: 8px;
      background: transparent;
      text-align: left;
    }
    .trace-tab:hover,
    .trace-tab.active {
      background: var(--accent-soft);
      border-left-color: var(--accent);
    }
    .trace-tab strong {
      display: block;
      font-size: 14px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .trace-tab span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }
    .trace-tab .gap {
      color: var(--gap);
    }
    .empty-state {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .reader {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      padding: 24px 30px 36px;
    }
    .trace-head {
      max-width: 820px;
    }
    .trace-head h2 {
      margin: 2px 0 7px;
      font-size: 30px;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }
    .trace-head p {
      margin: 0;
      max-width: 78ch;
      color: var(--soft-ink);
    }
    .trace-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .trace-meta .gap {
      color: var(--gap);
    }
    .path {
      max-width: 860px;
      margin: 24px 0 0;
      padding: 0;
      list-style: none;
    }
    .path-item {
      position: relative;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 12px;
      min-height: 92px;
    }
    .path-item::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 42px;
      bottom: -14px;
      width: 1px;
      background: var(--line);
    }
    .path-item:last-child::before {
      display: none;
    }
    .path-index {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 29px;
      height: 29px;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }
    .path-item.active .path-index {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .path-item.gap .path-index {
      border-color: rgba(168,77,50,.35);
      background: var(--gap-soft);
      color: var(--gap);
    }
    .path-button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 4px 12px;
      width: 100%;
      min-height: 76px;
      padding: 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      text-align: left;
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }
    .path-button:hover,
    .path-item.active .path-button {
      border-color: rgba(15,118,110,.38);
      background: var(--surface);
      transform: translateX(1px);
    }
    .path-item.gap .path-button:hover,
    .path-item.gap.active .path-button {
      border-color: rgba(168,77,50,.32);
      background: var(--gap-soft);
    }
    .step-kicker {
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .path-confidence {
      align-self: start;
      color: var(--quiet);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }
    .path-confidence[data-level="direct"] { color: var(--accent); }
    .path-confidence[data-level="inferred"] { color: var(--rule); }
    .path-confidence[data-level="module-level"] { color: var(--module); }
    .path-button strong {
      grid-column: 1 / -1;
      font-size: 16px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .path-button p {
      grid-column: 1 / -1;
      margin: 0;
      color: var(--soft-ink);
      font-size: 13px;
    }
    .lens {
      min-height: 0;
      overflow: auto;
      padding: 24px 18px;
      background: var(--surface);
      border-left: 1px solid var(--line);
    }
    .lens h2 {
      margin: 3px 0 0;
      font-size: 23px;
      line-height: 1.12;
      overflow-wrap: anywhere;
    }
    .lens p {
      margin: 0;
      color: var(--soft-ink);
    }
    .why-row {
      margin-top: 18px;
      padding-top: 15px;
      border-top: 1px solid var(--line);
    }
    .why-row h3 {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .contract-stack {
      display: grid;
      gap: 14px;
    }
    .contract-block {
      padding-top: 2px;
    }
    .contract-block + .contract-block {
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .contract-block header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .contract-block strong {
      overflow-wrap: anywhere;
    }
    .contract-block small {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .inspect-node {
      flex: 0 0 auto;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--accent);
      font-size: 12px;
      font-weight: 760;
    }
    .inspect-node:hover {
      text-decoration: underline;
    }
    .contract-summary {
      margin-bottom: 8px;
      font-size: 13px;
    }
    .clause-list {
      display: grid;
      gap: 7px;
    }
    .clause {
      display: grid;
      gap: 3px;
      padding: 8px 0 8px 10px;
      border-left: 2px solid var(--line);
    }
    .clause.gap {
      border-left-color: rgba(168,77,50,.55);
      background: linear-gradient(90deg, var(--gap-soft), transparent 72%);
    }
    .clause-label {
      color: var(--ink);
      font-size: 12px;
      font-weight: 760;
      overflow-wrap: anywhere;
    }
    .clause-kind {
      color: var(--quiet);
      font-size: 10px;
      font-weight: 760;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .support-button {
      display: block;
      width: 100%;
      min-height: 42px;
      margin-top: 7px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      text-align: left;
    }
    .support-button:hover {
      border-color: rgba(15,118,110,.55);
      color: var(--accent);
    }
    .support-button small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .source-details {
      margin-top: 18px;
      padding-top: 15px;
      border-top: 1px solid var(--line);
    }
    .source-details summary {
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 760;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    code {
      display: block;
      margin-top: 8px;
      color: #42505c;
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow-wrap: anywhere;
      white-space: normal;
    }
    @media (max-width: 1120px) {
      .workspace {
        grid-template-columns: 240px minmax(0, 1fr);
      }
      .lens {
        grid-column: 1 / -1;
        max-height: 320px;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
    @media (max-width: 760px) {
      body {
        overflow: auto;
      }
      .app {
        display: block;
        height: auto;
        min-height: 100vh;
      }
      .top {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 16px;
      }
      h1 {
        font-size: 32px;
      }
      .source-summary {
        justify-content: flex-start;
        white-space: normal;
      }
      .workspace {
        display: block;
      }
      .entry-panel {
        display: block;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .entry-head,
      .search-row {
        margin-bottom: 12px;
      }
      .trace-tabs {
        display: flex;
        overflow-x: auto;
        gap: 8px;
      }
      .trace-tab {
        flex: 0 0 210px;
        border-left: 0;
        border-bottom: 3px solid transparent;
        background: #fff;
        border-radius: 8px;
      }
      .trace-tab:hover,
      .trace-tab.active {
        border-left-color: transparent;
        border-bottom-color: var(--accent);
      }
      .reader {
        padding: 20px 16px 28px;
      }
      .trace-head h2 {
        font-size: 28px;
      }
      .path-button {
        grid-template-columns: minmax(0, 1fr);
      }
      .path-confidence {
        justify-self: start;
      }
      .lens {
        max-height: none;
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <script id="atlas-data" type="application/json">__ATLAS_JSON__</script>
  <div class="app">
    <header class="top">
      <div>
        <p class="eyebrow">RMS Atlas</p>
        <h1 id="moduleName">Module</h1>
        <p class="purpose" id="modulePurpose"></p>
      </div>
      <div class="source-summary" id="stats"></div>
    </header>

    <main class="workspace">
      <aside class="entry-panel">
        <div class="entry-head">
          <p class="eyebrow">Entrypoints</p>
          <span class="entry-count" id="entryCount"></span>
        </div>
        <div class="search-row">
          <input id="search" type="search" placeholder="Filter">
          <button class="button" id="reset" type="button">Reset</button>
        </div>
        <nav class="trace-tabs" id="traceTabs" aria-label="Entrypoints"></nav>
      </aside>

      <section class="reader" aria-label="Reason path">
        <header class="trace-head">
          <p class="eyebrow" id="traceIntent">Entrypoint</p>
          <h2 id="traceTitle">No entrypoint selected</h2>
          <p id="traceSummary"></p>
          <div class="trace-meta" id="traceMeta"></div>
        </header>
        <ol class="path" id="lanes"></ol>
      </section>

      <aside class="lens" id="lens" aria-live="polite"></aside>
    </main>
  </div>

  <script>
    const atlas = JSON.parse(document.getElementById('atlas-data').textContent);
    const roleOrder = ['Stimulus', 'Boundary', 'Rule', 'State', 'Effect', 'Outcome', 'Operate', 'Proof', 'Compatibility'];
    const roleLabel = {
      Stimulus: 'Start',
      Boundary: 'Boundary',
      Rule: 'Rule',
      State: 'State',
      Effect: 'Effect',
      Outcome: 'Outcome',
      Operate: 'Recovery',
      Proof: 'Proof',
      Compatibility: 'Compatibility'
    };
    const roleRisk = {
      Stimulus: 'Changing this entrypoint can change the public reason the behavior exists.',
      Boundary: 'Changing this lane can alter validation, authorization, or accepted input.',
      Rule: 'Changing this lane can weaken or move domain authority.',
      State: 'Changing this lane can affect lifecycle, persistence, concurrency, or migrations.',
      Effect: 'Changing this lane can affect external truth, retries, idempotency, or compensation.',
      Outcome: 'Changing this lane can affect subscribers, queries, or observable facts.',
      Operate: 'Changing this lane can affect recovery, reconciliation, or incident handling.',
      Proof: 'Changing this lane can leave promises unverified.',
      Compatibility: 'Changing this lane can break existing consumers or stored state.'
    };
    const roleToGap = {
      Boundary: 'boundary',
      Rule: 'rule',
      State: 'state',
      Effect: 'effect',
      Outcome: 'outcome',
      Proof: 'proof'
    };
    const nodeById = new Map(atlas.nodes.map(node => [node.id, node]));

    const stats = document.getElementById('stats');
    const entryCount = document.getElementById('entryCount');
    const search = document.getElementById('search');
    const traceTabs = document.getElementById('traceTabs');
    const traceIntent = document.getElementById('traceIntent');
    const traceTitle = document.getElementById('traceTitle');
    const traceSummary = document.getElementById('traceSummary');
    const traceMeta = document.getElementById('traceMeta');
    const lanes = document.getElementById('lanes');
    const lens = document.getElementById('lens');

    let selectedTrace = defaultTrace();
    let selectedFocus = selectedTrace?.steps?.[0] ? { type: 'step', value: selectedTrace.steps[0] } : null;

    document.getElementById('moduleName').textContent = atlas.module.name;
    document.getElementById('modulePurpose').textContent = atlas.module.purpose;
    stats.innerHTML = `
      <span><strong>${escapeHtml(atlas.traces?.length || 0)}</strong> entrypoints</span>
      <span><strong>${escapeHtml(atlas.source.source_revision || 'unknown')}</strong></span>
    `;
    entryCount.textContent = `${atlas.traces?.length || 0} total`;

    document.getElementById('reset').addEventListener('click', () => {
      search.value = '';
      selectedTrace = defaultTrace();
      selectedFocus = selectedTrace?.steps?.[0] ? { type: 'step', value: selectedTrace.steps[0] } : null;
      render();
    });
    search.addEventListener('input', renderTraceTabs);

    function defaultTrace() {
      return atlas.traces?.find(trace => trace.gaps.length === 0) || atlas.traces?.[0] || null;
    }

    function render() {
      renderTraceTabs();
      renderTraceHeader();
      renderLanes();
      renderLens();
    }

    function queryText() {
      return search.value.trim().toLowerCase();
    }

    function traceSearchText(trace) {
      return [
        trace.label,
        trace.intent,
        trace.summary,
        ...(trace.source_refs || []).map(ref => ref.path),
        ...(trace.steps || []).flatMap(step => [step.role, step.title, step.body, step.confidence]),
        ...(trace.gaps || []).flatMap(gap => [gap.title, gap.body, gap.suggested_artifact || ''])
      ].join(' ');
    }

    function renderTraceTabs() {
      const query = queryText();
      const traces = (atlas.traces || []).filter(trace => !query || traceSearchText(trace).toLowerCase().includes(query));
      traceTabs.innerHTML = traces.length ? traces.map(trace => `
        <button class="trace-tab ${selectedTrace?.id === trace.id ? 'active' : ''}" type="button" data-trace="${escapeHtml(trace.id)}">
          <strong>${escapeHtml(trace.label)}</strong>
          <span>${escapeHtml(trace.intent || 'Entrypoint')}</span>
          <span class="${trace.gaps.length ? 'gap' : ''}">${trace.gaps.length ? `${trace.gaps.length} gap${trace.gaps.length === 1 ? '' : 's'}` : 'complete'}</span>
        </button>
      `).join('') : '<p class="empty-state">No matching entrypoints.</p>';
      traceTabs.querySelectorAll('[data-trace]').forEach(button => {
        button.addEventListener('click', () => {
          selectedTrace = atlas.traces.find(trace => trace.id === button.dataset.trace);
          selectedFocus = selectedTrace?.steps?.[0] ? { type: 'step', value: selectedTrace.steps[0] } : null;
          render();
        });
      });
    }

    function renderTraceHeader() {
      if (!selectedTrace) {
        traceIntent.textContent = 'Entrypoint';
        traceTitle.textContent = 'No entrypoint selected';
        traceSummary.textContent = '';
        traceMeta.innerHTML = '';
        return;
      }
      traceIntent.textContent = selectedTrace.intent || 'Entrypoint';
      traceTitle.textContent = selectedTrace.label;
      traceSummary.textContent = selectedTrace.summary;
      traceMeta.innerHTML = `
        <span class="${selectedTrace.gaps.length ? 'gap' : ''}">${selectedTrace.gaps.length ? `${selectedTrace.gaps.length} gap${selectedTrace.gaps.length === 1 ? '' : 's'}` : 'complete'}</span>
        <span>${selectedTrace.steps.length} stages</span>
        <span>${selectedTrace.source_refs.length} source refs</span>
      `;
    }

    function renderLanes() {
      if (!selectedTrace) {
        lanes.innerHTML = '';
        return;
      }
      const items = [];
      roleOrder.forEach(role => {
        const lane = renderLane(role, items.length + 1);
        if (lane) {
          items.push(lane);
        }
      });
      lanes.innerHTML = items.join('');
      lanes.querySelectorAll('[data-step]').forEach(button => {
        button.addEventListener('click', () => {
          selectedFocus = { type: 'step', value: selectedTrace.steps.find(step => step.id === button.dataset.step) };
          render();
        });
      });
      lanes.querySelectorAll('[data-gap]').forEach(button => {
        button.addEventListener('click', () => {
          selectedFocus = { type: 'gap', value: selectedTrace.gaps.find(gap => gap.id === button.dataset.gap) };
          render();
        });
      });
    }

    function renderLane(role, index) {
      const step = selectedTrace.steps.find(item => item.role === role);
      const gap = roleToGap[role] ? selectedTrace.gaps.find(item => item.id === roleToGap[role]) : null;
      if (step) {
        const active = selectedFocus?.type === 'step' && selectedFocus.value.id === step.id;
        return `
          <li class="path-item ${active ? 'active' : ''}">
            <span class="path-index">${escapeHtml(index)}</span>
            <button class="path-button" type="button" data-step="${escapeHtml(step.id)}">
              <span class="step-kicker">${escapeHtml(roleLabel[role] || role)}</span>
              <span class="path-confidence" data-level="${escapeHtml(step.confidence)}">${escapeHtml(step.confidence)}</span>
              <strong>${escapeHtml(step.title)}</strong>
              <p>${escapeHtml(step.body)}</p>
            </button>
          </li>
        `;
      }
      if (gap) {
        const active = selectedFocus?.type === 'gap' && selectedFocus.value.id === gap.id;
        return `
          <li class="path-item gap ${active ? 'active' : ''}">
            <span class="path-index">${escapeHtml(index)}</span>
            <button class="path-button" type="button" data-gap="${escapeHtml(gap.id)}">
              <span class="step-kicker">${escapeHtml(roleLabel[role] || role)}</span>
              <span class="path-confidence" data-level="module-level">gap</span>
              <strong>${escapeHtml(gap.title)}</strong>
              <p>${escapeHtml(gap.body)}</p>
            </button>
          </li>
        `;
      }
      return '';
    }

    function renderLens() {
      if (!selectedFocus) {
        lens.innerHTML = '<p class="purpose">Select a stage.</p>';
        return;
      }
      if (selectedFocus.type === 'gap') {
        renderGapLens(selectedFocus.value);
      } else if (selectedFocus.type === 'node') {
        renderNodeLens(selectedFocus.value);
      } else {
        renderStepLens(selectedFocus.value);
      }
    }

    function renderStepLens(step) {
      const nodes = step.node_ids.map(id => nodeById.get(id)).filter(Boolean);
      lens.innerHTML = `
        <p class="eyebrow">${escapeHtml(roleLabel[step.role] || step.role)} / ${escapeHtml(step.confidence)}</p>
        <h2>${escapeHtml(step.title)}</h2>
        <section class="why-row">
          <h3>Stage meaning</h3>
          <p>${escapeHtml(step.body)}</p>
        </section>
        <section class="why-row">
          <h3>Semantic contract</h3>
          ${nodes.length ? `<div class="contract-stack">${nodes.map(contractBlock).join('')}</div>` : '<p>No semantic node support.</p>'}
        </section>
        <section class="why-row">
          <h3>Change risk</h3>
          <p>${escapeHtml(roleRisk[step.role] || 'Review this semantic stage before changing it.')}</p>
        </section>
        ${sourceDetails(step.source_refs)}
      `;
      bindNodeButtons();
    }

    function renderGapLens(gap) {
      lens.innerHTML = `
        <p class="eyebrow">Gap</p>
        <h2>${escapeHtml(gap.title)}</h2>
        <section class="why-row">
          <h3>Gap meaning</h3>
          <p>${escapeHtml(gap.body)}</p>
        </section>
        <section class="why-row">
          <h3>Missing support</h3>
          <p>${escapeHtml(gap.suggested_artifact || 'Not specified')}</p>
        </section>
        ${sourceDetails(gap.source_refs)}
      `;
    }

    function renderNodeLens(node) {
      lens.innerHTML = `
        <p class="eyebrow">${escapeHtml(node.layer)} / ${escapeHtml(node.kind)}</p>
        <h2>${escapeHtml(node.label)}</h2>
        <section class="why-row">
          <h3>Meaning</h3>
          <p>${escapeHtml(node.summary)}</p>
        </section>
        <section class="why-row">
          <h3>Semantic contract</h3>
          ${contractBlock(node, false)}
        </section>
        <section class="why-row">
          <h3>Group</h3>
          <p>${escapeHtml(node.group || 'none')}</p>
        </section>
        ${sourceDetails(node.source_refs)}
      `;
    }

    function contractBlock(node, includeInspect = true) {
      const clauses = node.clauses || [];
      return `
        <article class="contract-block">
          <header>
            <div>
              <strong>${escapeHtml(node.label)}</strong>
              <small>${escapeHtml(node.layer)} / ${escapeHtml(node.kind)}</small>
            </div>
            ${includeInspect ? `<button class="inspect-node" type="button" data-node="${escapeHtml(node.id)}">Inspect</button>` : ''}
          </header>
          <p class="contract-summary">${escapeHtml(node.summary)}</p>
          ${clauses.length ? `<div class="clause-list">${clauses.map(clauseRow).join('')}</div>` : '<p class="empty-state">No richer contract clauses are declared for this semantic node.</p>'}
        </article>
      `;
    }

    function clauseRow(clause) {
      return `
        <div class="clause ${clause.kind === 'gap' ? 'gap' : ''}">
          <span class="clause-kind">${escapeHtml(clause.kind)}</span>
          <span class="clause-label">${escapeHtml(clause.label)}</span>
          <p>${escapeHtml(clause.statement)}</p>
        </div>
      `;
    }

    function nodeButton(node) {
      return `
        <button class="support-button" type="button" data-node="${escapeHtml(node.id)}" aria-label="Open ${escapeHtml(node.label)}">
          <span>${escapeHtml(node.label)}<small>${escapeHtml(node.layer)} / ${escapeHtml(node.kind)}</small></span>
        </button>
      `;
    }

    function bindNodeButtons() {
      lens.querySelectorAll('[data-node]').forEach(button => {
        button.addEventListener('click', () => {
          selectedFocus = { type: 'node', value: nodeById.get(button.dataset.node) };
          render();
        });
      });
    }

    function sourceDetails(refs) {
      return `
        <details class="source-details">
          <summary>Source refs</summary>
          ${sourceRefs(refs)}
        </details>
      `;
    }

    function sourceRefs(refs) {
      return refs?.length ? refs.map(ref => `<code>${escapeHtml(ref.role)}: ${escapeHtml(ref.path)}</code>`).join('') : '<p>No source refs.</p>';
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    render();
  </script>
</body>
</html>
