<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RMS Atlas</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --soft-ink: #3f4b56;
      --muted: #6b7480;
      --quiet: #8a949f;
      --line: #dce1e6;
      --surface: #ffffff;
      --field: #f5f6f8;
      --accent: #0f766e;
      --accent-soft: #e8f4f1;
      --gap: #a84d32;
      --gap-soft: #fff3ee;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      overflow: hidden;
      color: var(--ink);
      background: var(--field);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input {
      font: inherit;
      color: inherit;
    }
    button { cursor: pointer; }
    .app {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding: 18px 24px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
      letter-spacing: 0;
    }
    h1, h2, h3 { letter-spacing: 0; }
    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
    }
    .purpose {
      max-width: 80ch;
      margin: 8px 0 0;
      color: var(--soft-ink);
    }
    .source-summary {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .source-summary strong {
      color: var(--ink);
      font-weight: 760;
    }
    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr);
      background: var(--field);
    }
    .entry-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 12px;
      padding: 16px;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid var(--line);
    }
    .entry-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .entry-head .eyebrow { margin: 0; }
    .entry-count {
      color: var(--quiet);
      font-size: 12px;
      font-weight: 700;
    }
    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }
    input[type="search"] {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      outline: none;
    }
    input[type="search"]:focus {
      border-color: rgba(15,118,110,.55);
      box-shadow: 0 0 0 3px rgba(15,118,110,.08);
    }
    .button {
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .button:hover {
      border-color: rgba(15,118,110,.55);
      color: var(--accent);
    }
    .trace-tabs {
      min-height: 0;
      display: grid;
      align-content: start;
      gap: 4px;
      overflow: auto;
    }
    .trace-tab {
      width: 100%;
      padding: 10px 10px 10px 12px;
      border: 0;
      border-left: 3px solid transparent;
      border-radius: 8px;
      background: transparent;
      text-align: left;
    }
    .trace-tab:hover,
    .trace-tab.active {
      background: var(--accent-soft);
      border-left-color: var(--accent);
    }
    .trace-tab strong {
      display: block;
      font-size: 14px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .trace-tab span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .trace-tab .gap { color: var(--gap); }
    .story {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      padding: 26px 34px 40px;
    }
    .story-inner {
      max-width: 980px;
    }
    .story-head h2 {
      margin: 2px 0 8px;
      font-size: 34px;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }
    .story-head p {
      max-width: 76ch;
      margin: 0;
      color: var(--soft-ink);
      font-size: 15px;
    }
    .plain-summary {
      margin: 22px 0 24px;
      padding: 18px 0 0;
      border-top: 1px solid var(--line);
    }
    .plain-summary h3 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.2;
    }
    .plain-summary p {
      max-width: 78ch;
      margin: 0;
      color: var(--soft-ink);
      font-size: 16px;
      line-height: 1.5;
    }
    .moments {
      display: grid;
      gap: 10px;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .moment {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 12px;
    }
    .moment-number {
      display: grid;
      place-items: center;
      width: 31px;
      height: 31px;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }
    .moment.active .moment-number {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .moment-button {
      width: 100%;
      min-height: 74px;
      padding: 13px 14px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      text-align: left;
    }
    .moment-button:hover,
    .moment.active .moment-button {
      border-color: rgba(15,118,110,.38);
      background: #fff;
    }
    .moment-kicker {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: 0;
    }
    .moment-button strong {
      display: block;
      font-size: 17px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }
    .moment-button p {
      margin: 5px 0 0;
      color: var(--soft-ink);
    }
    .moment-detail {
      grid-column: 2;
      margin: -2px 0 8px;
      padding: 0 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .meaning-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 12px;
    }
    .meaning {
      min-width: 0;
    }
    .meaning h4 {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: 0;
    }
    .meaning p {
      margin: 0;
      color: var(--soft-ink);
    }
    .meaning.warning {
      padding-left: 10px;
      border-left: 2px solid rgba(168,77,50,.58);
    }
    details {
      margin-top: 14px;
    }
    summary {
      width: fit-content;
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      font-weight: 760;
    }
    .evidence {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .evidence-item {
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .evidence-item strong {
      display: block;
      overflow-wrap: anywhere;
    }
    .evidence-item small {
      display: block;
      margin: 2px 0 4px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .raw {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    code {
      display: block;
      margin-top: 7px;
      color: #42505c;
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow-wrap: anywhere;
      white-space: normal;
    }
    .empty-state {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 900px) {
      body { overflow: auto; }
      .app {
        display: block;
        height: auto;
        min-height: 100vh;
      }
      .top {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 16px;
      }
      h1 { font-size: 32px; }
      .source-summary {
        justify-content: flex-start;
        white-space: normal;
      }
      .workspace {
        display: block;
      }
      .entry-panel {
        display: block;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .entry-head,
      .search-row {
        margin-bottom: 12px;
      }
      .trace-tabs {
        display: grid;
        overflow: visible;
        gap: 8px;
      }
      .trace-tab {
        width: 100%;
        border-left: 0;
        border-bottom: 3px solid transparent;
        background: #fff;
        border-radius: 8px;
      }
      .trace-tab:hover,
      .trace-tab.active {
        border-left-color: transparent;
        border-bottom-color: var(--accent);
      }
      .story {
        padding: 20px 16px 28px;
      }
      .story-head h2 {
        font-size: 30px;
      }
      .meaning-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <script id="atlas-data" type="application/json">__ATLAS_JSON__</script>
  <div class="app">
    <header class="top">
      <div>
        <p class="eyebrow">RMS Atlas</p>
        <h1 id="moduleName">Module</h1>
        <p class="purpose" id="modulePurpose"></p>
      </div>
      <div class="source-summary" id="stats"></div>
    </header>

    <main class="workspace">
      <aside class="entry-panel">
        <div class="entry-head">
          <p class="eyebrow">Entrypoints</p>
          <span class="entry-count" id="entryCount"></span>
        </div>
        <div class="search-row">
          <input id="search" type="search" placeholder="Filter">
          <button class="button" id="reset" type="button">Reset</button>
        </div>
        <nav class="trace-tabs" id="traceTabs" aria-label="Entrypoints"></nav>
      </aside>

      <section class="story" aria-label="Human story">
        <div class="story-inner">
          <header class="story-head">
            <p class="eyebrow" id="traceIntent">Entrypoint</p>
            <h2 id="traceTitle">No entrypoint selected</h2>
            <p id="traceSummary"></p>
          </header>
          <section class="plain-summary">
            <h3>In plain words</h3>
            <p id="plainSummary"></p>
          </section>
          <ol class="moments" id="moments"></ol>
        </div>
      </section>
    </main>
  </div>

  <script>
    const atlas = JSON.parse(document.getElementById('atlas-data').textContent);
    const roleOrder = ['Stimulus', 'Boundary', 'Rule', 'State', 'Effect', 'Outcome', 'Operate', 'Proof', 'Compatibility'];
    const roleCopy = {
      Stimulus: {
        label: 'Start',
        title: 'What someone is trying to do',
        why: 'This is the public reason this behavior exists.'
      },
      Boundary: {
        label: 'Allowed in',
        title: 'What is allowed to enter',
        why: 'This protects the module from bad input, wrong callers, or old contracts.'
      },
      Rule: {
        label: 'Rule',
        title: 'The promise that must stay true',
        why: 'This is the promise a refactor must not weaken.'
      },
      State: {
        label: 'State',
        title: 'Where the truth lives',
        why: 'This is where lifecycle, ordering, concurrency, or migration risk usually appears.'
      },
      Effect: {
        label: 'Outside',
        title: 'Where outside truth can diverge',
        why: 'This is where duplicate charges, unknown provider outcomes, and recovery risk usually live.'
      },
      Outcome: {
        label: 'Result',
        title: 'What the rest of the system learns',
        why: 'This is what consumers, events, or queries can observe.'
      },
      Operate: {
        label: 'Recovery',
        title: 'How humans recover',
        why: 'This is what helps when runtime truth diverges from expected truth.'
      },
      Proof: {
        label: 'Trust',
        title: 'Why we trust it',
        why: 'This is what lets a reviewer trust the behavior instead of guessing.'
      },
      Compatibility: {
        label: 'Change',
        title: 'How change stays safe',
        why: 'This is where existing consumers or stored state can be broken.'
      }
    };
    const roleToGap = {
      Boundary: 'boundary',
      Rule: 'rule',
      State: 'state',
      Effect: 'effect',
      Outcome: 'outcome',
      Proof: 'proof'
    };

    const stats = document.getElementById('stats');
    const entryCount = document.getElementById('entryCount');
    const search = document.getElementById('search');
    const traceTabs = document.getElementById('traceTabs');
    const traceIntent = document.getElementById('traceIntent');
    const traceTitle = document.getElementById('traceTitle');
    const traceSummary = document.getElementById('traceSummary');
    const plainSummary = document.getElementById('plainSummary');
    const moments = document.getElementById('moments');

    let selectedTrace = defaultTrace();
    let selectedFocus = selectedTrace?.steps?.[0] ? { type: 'step', value: selectedTrace.steps[0] } : null;

    document.getElementById('moduleName').textContent = atlas.module.name;
    document.getElementById('modulePurpose').textContent = atlas.module.purpose;
    stats.innerHTML = `
      <span><strong>${escapeHtml(atlas.traces?.length || 0)}</strong> entrypoints</span>
      <span><strong>${escapeHtml(atlas.source.source_revision || 'unknown')}</strong></span>
    `;
    entryCount.textContent = `${atlas.traces?.length || 0} total`;

    document.getElementById('reset').addEventListener('click', () => {
      search.value = '';
      selectedTrace = defaultTrace();
      selectedFocus = selectedTrace?.steps?.[0] ? { type: 'step', value: selectedTrace.steps[0] } : null;
      render();
    });
    search.addEventListener('input', renderTraceTabs);

    function defaultTrace() {
      return atlas.traces?.find(trace => trace.gaps.length === 0) || atlas.traces?.[0] || null;
    }

    function render() {
      renderTraceTabs();
      renderStory();
      renderMoments();
    }

    function queryText() {
      return search.value.trim().toLowerCase();
    }

    function traceSearchText(trace) {
      return [
        trace.label,
        trace.intent,
        trace.summary,
        ...(trace.steps || []).flatMap(step => [
          step.role,
          step.title,
          step.body,
          step.reading?.promise,
          step.reading?.before,
          step.reading?.after,
          step.reading?.failure,
          step.reading?.evidence,
          step.reading?.impact
        ]),
        ...(trace.gaps || []).flatMap(gap => [gap.title, gap.body, gap.suggested_artifact || ''])
      ].join(' ');
    }

    function renderTraceTabs() {
      const query = queryText();
      const traces = (atlas.traces || []).filter(trace => !query || traceSearchText(trace).toLowerCase().includes(query));
      traceTabs.innerHTML = traces.length ? traces.map(trace => `
        <button class="trace-tab ${selectedTrace?.id === trace.id ? 'active' : ''}" type="button" data-trace="${escapeHtml(trace.id)}">
          <strong>${escapeHtml(trace.label)}</strong>
          <span>${trace.gaps.length ? `${trace.gaps.length} missing piece${trace.gaps.length === 1 ? '' : 's'}` : 'complete enough to follow'}</span>
          <span class="${trace.gaps.length ? 'gap' : ''}">${trace.steps.length} steps</span>
        </button>
      `).join('') : '<p class="empty-state">No matching entrypoints.</p>';
      traceTabs.querySelectorAll('[data-trace]').forEach(button => {
        button.addEventListener('click', () => {
          selectedTrace = atlas.traces.find(trace => trace.id === button.dataset.trace);
          selectedFocus = selectedTrace?.steps?.[0] ? { type: 'step', value: selectedTrace.steps[0] } : null;
          render();
        });
      });
    }

    function renderStory() {
      if (!selectedTrace) {
        traceIntent.textContent = 'Entrypoint';
        traceTitle.textContent = 'No entrypoint selected';
        traceSummary.textContent = '';
        plainSummary.textContent = '';
        return;
      }
      traceIntent.textContent = selectedTrace.gaps.length ? 'Needs a missing piece' : 'Readable flow';
      traceTitle.textContent = selectedTrace.label;
      traceSummary.textContent = selectedTrace.summary;
      plainSummary.textContent = storySummary(selectedTrace);
    }

    function storySummary(trace) {
      const pieces = [];
      const start = stepFor(trace, 'Stimulus');
      const rule = stepFor(trace, 'Rule');
      const effect = stepFor(trace, 'Effect');
      const outcome = stepFor(trace, 'Outcome');
      const operate = stepFor(trace, 'Operate');
      if (start) pieces.push(firstSentence(start.reading?.promise || start.body));
      if (rule) pieces.push(`It must preserve the rule that ${lowerFirst(firstSentence(rule.reading?.promise || rule.body))}`);
      if (effect) pieces.push(firstSentence(effect.reading?.promise || effect.body));
      if (outcome) pieces.push(`When it succeeds, ${lowerFirst(firstSentence(outcome.reading?.promise || outcome.body))}`);
      if (operate) pieces.push(`If reality is unclear, ${lowerFirst(firstSentence(operate.reading?.promise || operate.body))}`);
      return pieces.length ? pieces.map(ensureSentence).join(' ') : clean(trace.summary);
    }

    function stepFor(trace, role) {
      return trace.steps.find(step => step.role === role);
    }

    function renderMoments() {
      if (!selectedTrace) {
        moments.innerHTML = '';
        return;
      }
      const items = [];
      roleOrder.forEach(role => {
        const rendered = renderMoment(role, items.length + 1);
        if (rendered) items.push(rendered);
      });
      moments.innerHTML = items.join('');
      moments.querySelectorAll('[data-step]').forEach(button => {
        button.addEventListener('click', () => {
          selectedFocus = { type: 'step', value: selectedTrace.steps.find(step => step.id === button.dataset.step) };
          renderMoments();
        });
      });
      moments.querySelectorAll('[data-gap]').forEach(button => {
        button.addEventListener('click', () => {
          selectedFocus = { type: 'gap', value: selectedTrace.gaps.find(gap => gap.id === button.dataset.gap) };
          renderMoments();
        });
      });
    }

    function renderMoment(role, index) {
      const step = selectedTrace.steps.find(item => item.role === role);
      const gap = roleToGap[role] ? selectedTrace.gaps.find(item => item.id === roleToGap[role]) : null;
      if (step) {
        const active = selectedFocus?.type === 'step' && selectedFocus.value.id === step.id;
        return `
          <li class="moment ${active ? 'active' : ''}">
            <span class="moment-number">${escapeHtml(index)}</span>
            <button class="moment-button" type="button" data-step="${escapeHtml(step.id)}">
              <span class="moment-kicker">${escapeHtml(roleCopy[role]?.label || role)}</span>
              <strong>${escapeHtml(roleCopy[role]?.title || step.title)}</strong>
              <p>${escapeHtml(clean(step.reading?.promise || step.body))}</p>
            </button>
            ${active ? stepDetail(step) : ''}
          </li>
        `;
      }
      if (gap) {
        const active = selectedFocus?.type === 'gap' && selectedFocus.value.id === gap.id;
        return `
          <li class="moment ${active ? 'active' : ''}">
            <span class="moment-number">${escapeHtml(index)}</span>
            <button class="moment-button" type="button" data-gap="${escapeHtml(gap.id)}">
              <span class="moment-kicker">Unclear</span>
              <strong>${escapeHtml(gap.title)}</strong>
              <p>${escapeHtml(gap.body)}</p>
            </button>
            ${active ? gapDetail(gap) : ''}
          </li>
        `;
      }
      return '';
    }

    function stepDetail(step) {
      const reading = step.reading || {};
      const copy = roleCopy[step.role] || {};
      return `
        <div class="moment-detail">
          <div class="meaning-grid">
            <section class="meaning">
              <h4>Meaning</h4>
              <p>${escapeHtml(clean(reading.promise || step.body))}</p>
            </section>
            <section class="meaning warning">
              <h4>Risk</h4>
              <p>${escapeHtml(humanProblem(reading.failure))}</p>
            </section>
            <section class="meaning">
              <h4>Why it matters</h4>
              <p>${escapeHtml(clean(copy.why || reading.impact || 'This affects how people understand or change the module.'))}</p>
            </section>
          </div>
          <details>
            <summary>Show evidence</summary>
            ${evidenceList(reading.justification)}
            <p class="raw">${escapeHtml(clean(reading.evidence || 'No evidence statement.'))}</p>
            ${sourceRefs(step.source_refs)}
          </details>
        </div>
      `;
    }

    function gapDetail(gap) {
      return `
        <div class="moment-detail">
          <div class="meaning-grid">
            <section class="meaning warning">
              <h4>Unclear</h4>
              <p>${escapeHtml(gap.body)}</p>
            </section>
            <section class="meaning">
              <h4>Needed</h4>
              <p>${escapeHtml(gap.suggested_artifact || 'A more explicit canonical artifact.')}</p>
            </section>
            <section class="meaning">
              <h4>Why it matters</h4>
              <p>Until this is explicit, the atlas has to show uncertainty instead of pretending the flow is known.</p>
            </section>
          </div>
          <details>
            <summary>Show evidence</summary>
            ${sourceRefs(gap.source_refs)}
          </details>
        </div>
      `;
    }

    function evidenceList(items = []) {
      return items.length ? `
        <div class="evidence">
          ${items.map(item => `
            <div class="evidence-item">
              <small>${escapeHtml(clean(item.role))}</small>
              <strong>${escapeHtml(clean(item.label))}</strong>
              <p>${escapeHtml(clean(item.detail))}</p>
            </div>
          `).join('')}
        </div>
      ` : '<p class="empty-state">No evidence nodes.</p>';
    }

    function sourceRefs(refs) {
      return refs?.length ? refs.map(ref => `<code>${escapeHtml(ref.role)}: ${escapeHtml(ref.path)}</code>`).join('') : '<p class="empty-state">No source refs.</p>';
    }

    function humanProblem(value) {
      const text = clean(value || '');
      if (!text || text === 'No stage-specific failure category is declared.') {
        return 'No failure mode is written down for this moment yet.';
      }
      if (text.startsWith('Missing ')) {
        return 'This part of the contract is not written down yet.';
      }
      return text;
    }

    function firstSentence(value) {
      const text = clean(value);
      const match = text.match(/^.*?[.!?](?:\s|$)/);
      return match ? match[0].trim() : text;
    }

    function ensureSentence(value) {
      const text = clean(value);
      return /[.!?]$/.test(text) ? text : `${text}.`;
    }

    function clean(value) {
      return String(value ?? '')
        .replace(/`/g, '')
        .replace(/_/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function lowerFirst(value) {
      return value ? value.charAt(0).toLowerCase() + value.slice(1) : value;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    render();
  </script>
</body>
