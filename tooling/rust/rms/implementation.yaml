spec: rms/implementation/v0.1

module: rms-cli
binding: rust

source:
  root: .
  public_entrypoint: src/main.rs

commands:
  build: cargo build --manifest-path Cargo.toml
  verify: cargo test --manifest-path Cargo.toml
  format: cargo fmt --manifest-path Cargo.toml --check

toolchain:
  cargo_manifest: Cargo.toml
  package: rms

dependencies:
  allowed_external_crates:
    - anyhow
    - clap
    - jsonschema
    - serde
    - serde_json
    - serde_yaml
    - sha2
    - syn
    - toml
    - walkdir

architecture:
  public_modules: []

semantic_functions:
  - id: validate-rms-artifacts-command
    symbol: run_validate
    kind: parser
    purity: effectful
    discharges:
      contracts:
        - contracts/validate-rms-artifacts.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
    assumptions:
      ensures:
        - validation diagnostics are derived from manifest schemas and semantic reference checks
    evidence:
      contracts:
        - verification/contracts/validate_rms_artifacts.md
  - id: explain-module-command
    symbol: run_explain
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/explain-module.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
    assumptions:
      ensures:
        - deterministic explanation content is derived from the target manifest and sibling implementation binding
        - provider-backed explanation is opt-in and uses a bounded RMS prompt with a run record
    evidence:
      contracts:
        - verification/contracts/explain_module.md
  - id: diagnose-rms-environment-command
    symbol: run_diagnose
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/diagnose-rms-environment.v1.yaml
      invariants:
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - diagnostic output reports repository, config, provider, run-record, and validation readiness without redefining RMS semantics
    evidence:
      contracts:
        - verification/contracts/diagnose_rms_environment.md
  - id: workbench-config-resolver
    symbol: resolve_prompt_run_options
    kind: adapter
    purity: effectful
    discharges:
      contracts:
        - contracts/render-workbench-prompt.v1.yaml
        - contracts/list-workbench-runs.v1.yaml
        - contracts/inspect-workbench-run.v1.yaml
        - contracts/latest-workbench-run.v1.yaml
      invariants:
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - optional workbench config only supplies provider, model, sandbox, write-scope, provider-timeout, and run-record defaults
        - provider execution remains opt-in through explicit provider selection or configured `--ai`
    evidence:
      contracts:
        - verification/contracts/render_workbench_prompt.md
        - verification/contracts/list_workbench_runs.md
        - verification/contracts/inspect_workbench_run.md
        - verification/contracts/latest_workbench_run.md
  - id: workbench-config-init-command
    symbol: run_config_init
    kind: adapter
    purity: effectful
    discharges:
      contracts:
        - contracts/init-workbench-config.v1.yaml
      invariants:
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - generated workbench config contains only provider, model, sandbox, optional write-scope, optional provider-timeout, and run-record defaults
        - existing config is preserved unless overwrite is explicit
    evidence:
      contracts:
        - verification/contracts/init_workbench_config.md
  - id: agent-integration-command
    symbol: run_agent_init
    kind: adapter
    purity: effectful
    discharges:
      contracts:
        - contracts/configure-agent-integration.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - project-local agent guidance is generated from embedded RMS assets
        - Codex plugins and global skills remain optional adapters rather than semantic dependencies
        - synchronization refreshes generated guidance without overwriting existing workbench config
    evidence:
      contracts:
        - verification/contracts/configure_agent_integration.md
  - id: agent-plugin-command
    symbol: run_agent_plugin_install
    kind: adapter
    purity: effectful
    discharges:
      contracts:
        - contracts/configure-agent-integration.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - optional Codex plugin package is generated from embedded RMS assets
        - personal marketplace entries point at the generated local plugin package
        - Codex plugin installation remains explicit and optional
    evidence:
      contracts:
        - verification/contracts/configure_agent_integration.md
  - id: init-rms-system-command
    symbol: run_init
    kind: adapter
    purity: effectful
    discharges:
      contracts:
        - contracts/init-rms-system.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - generated system, context map, glossary, agent instructions, workbench config, local agent skills, and ignore files are deterministic scaffold artifacts
        - generated agent and workbench artifacts route future work through RMS canonical manifests and the shared CLI
        - generated workbench config supplies operational provider and run-record defaults plus provider-timeout guidance only
    evidence:
      contracts:
        - verification/contracts/init_rms_system.md
  - id: add-rms-module-command
    symbol: run_add_module
    kind: adapter
    purity: effectful
    discharges:
      contracts:
        - contracts/add-rms-module.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - generated module manifest, module README, contract guidance, semantic shape evidence, evidence directories, and optional implementation binding are deterministic scaffold artifacts
        - optional advisory scaffold planning records provider output as evidence without making it canonical architecture by itself
        - generated guidance routes future work through canonical artifacts and does not define module-specific semantics
    evidence:
      contracts:
        - verification/contracts/add_rms_module.md
  - id: add-rms-capability-command
    symbol: run_add_capability
    kind: adapter
    purity: effectful
    discharges:
      contracts:
        - contracts/add-rms-capability.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - generated composite parent, domain child, boundary child, contracts, evidence, and optional child implementation bindings are deterministic scaffold artifacts
        - parent composition exports and child dependencies are wired through canonical manifests rather than agent-only guidance
        - generated parent verification can roll up composition and child implementation verification
    evidence:
      contracts:
        - verification/contracts/add_rms_capability.md
  - id: release-check-command
    symbol: run_release_check
    kind: interpreter
    purity: effectful
    discharges:
      contracts:
        - contracts/release-check.v1.yaml
      invariants:
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - release readiness is derived from deterministic repository checks and does not invoke optional AI providers
        - release package, module, and plugin versions are checked for consistency before artifacts are accepted
        - release-mode binary artifacts are built, smoke-tested outside `cargo run`, and checked through a temporary PATH install
        - Codex plugin packaging is checked against canonical skill source
    evidence:
      contracts:
        - verification/contracts/release_check.md
  - id: codex-plugin-sync-validator
    symbol: validate_codex_plugin_sync
    kind: parser
    purity: effectful
    discharges:
      contracts:
        - contracts/release-check.v1.yaml
      invariants:
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - packaged Codex skills match canonical skills exactly before release
    evidence:
      contracts:
        - verification/contracts/release_check.md
  - id: render-workbench-prompt-command
    symbol: run_prompt
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/render-workbench-prompt.v1.yaml
        - contracts/capture-intent-workbench.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - rendered prompts are advisory and derived from canonical module context plus selected workflow template
        - provider execution is opt-in, appends execution scope including timeout, and requires a run record
    evidence:
      contracts:
        - verification/contracts/render_workbench_prompt.md
  - id: workbench-run-record-writer
    symbol: write_prompt_run_record
    kind: adapter
    purity: effectful
    discharges:
      contracts:
        - contracts/render-workbench-prompt.v1.yaml
      invariants:
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - run records include request metadata, sandbox, write scope, provider timeout, execution root, prompt, and validation checks
        - run records preserve the requested review impact flag when present
    evidence:
      contracts:
        - verification/contracts/render_workbench_prompt.md
  - id: design-rms-system-command
    symbol: run_design
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/design-rms-system.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - design prompts are advisory and can run before a target module exists
        - module split and semantic shape recommendations remain evidence until reflected in canonical artifacts
    evidence:
      contracts:
        - verification/contracts/design_rms_system.md
  - id: compose-rms-system-command
    symbol: run_compose
    kind: interpreter
    purity: effectful
    discharges:
      contracts:
        - contracts/compose-rms-system.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
    assumptions:
      ensures:
        - composition findings are derived from discovered system, context-map, module, requirement, capability, containment, visibility, and export declarations
        - recursive parent exports remain invalid unless the parent publishes the surface and the child provides the backing surface
        - semantic shape direction smells are reported as review-required findings without failing composition
    evidence:
      contracts:
        - verification/contracts/compose_rms_system.md
  - id: route-rms-work-command
    symbol: run_route
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/route-rms-work.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - route reports are derived from target manifests, composition children, public exports, semantic shapes, and task language
        - route recommendations remain advisory until the agent follows the recommended module's canonical context and contracts
        - composite parents are not treated as implementation dumping grounds when a child owns the relevant semantic role
    evidence:
      contracts:
        - verification/contracts/route_rms_work.md
  - id: codex-provider-executor
    symbol: execute_codex_provider
    kind: interpreter
    purity: effectful
    discharges:
      contracts:
        - contracts/render-workbench-prompt.v1.yaml
    assumptions:
      requires:
        - provider is explicitly set to codex
      ensures:
        - writable module-scoped provider execution runs Codex from the target module directory
        - provider execution is terminated when it exceeds the selected provider timeout
        - provider stdout, stderr, and final response are written into the run record
    evidence:
      scenarios:
        - verification/scenarios/provider_execution.md
  - id: list-workbench-runs-command
    symbol: run_list_runs
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/list-workbench-runs.v1.yaml
      invariants:
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - saved run records are summarized without mutating run artifacts
    evidence:
      contracts:
        - verification/contracts/list_workbench_runs.md
  - id: inspect-workbench-run-command
    symbol: run_inspect_run
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/inspect-workbench-run.v1.yaml
      invariants:
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - one run record is rendered from request, prompt, checks, response, and provider logs when present
    evidence:
      contracts:
        - verification/contracts/inspect_workbench_run.md
  - id: latest-workbench-run-command
    symbol: run_latest_run
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/latest-workbench-run.v1.yaml
      invariants:
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - the newest saved run record is selected from generated run directories and rendered without mutation
    evidence:
      contracts:
        - verification/contracts/latest_workbench_run.md
  - id: workbench-prompt-renderer
    symbol: render_workbench_prompt
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/explain-module.v1.yaml
        - contracts/design-rms-system.v1.yaml
        - contracts/plan-module-change.v1.yaml
        - contracts/review-module-diff.v1.yaml
        - contracts/refactor-module-workbench.v1.yaml
        - contracts/implement-module-workbench.v1.yaml
        - contracts/capture-intent-workbench.v1.yaml
        - contracts/evolve-contract-workbench.v1.yaml
        - contracts/evidence-workbench.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
    assumptions:
      ensures:
        - intent, plan, review, refactor, implement, contract evolution, and evidence prompts preserve the RMS bounded context and name deterministic checks
        - intent and implement prompts preserve the think-before-code gate by asking for accepted context and canonical artifact updates before implementation
        - prompts include route evidence when the target is a composite parent or recursive module tree
        - evidence prompts include proof guidance derived from the routed owner semantic shape
        - review prompts can include derived git impact evidence before diff context without treating it as semantic authority
    evidence:
      contracts:
        - verification/contracts/plan_module_change.md
        - verification/contracts/review_module_diff.md
        - verification/contracts/refactor_module_workbench.md
        - verification/contracts/implement_module_workbench.md
        - verification/contracts/capture_intent_workbench.md
        - verification/contracts/evolve_contract_workbench.md
        - verification/contracts/evidence_workbench.md
  - id: analyze-git-impact-command
    symbol: run_impact
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/analyze-git-impact.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - impact reports are derived from git path evidence, discovered RMS manifests, implementation bindings, and declared verification references
        - conservative review and verification obligations are suggested without treating git metadata as semantic authority
    evidence:
      contracts:
        - verification/contracts/analyze_git_impact.md
  - id: gate-rms-change-command
    symbol: run_gate
    kind: interpreter
    purity: effectful
    discharges:
      contracts:
        - contracts/gate-rms-change.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - gate plans are derived from git impact analysis and declared implementation bindings
        - executable validation, composition, and verification checks are reported with pass or fail status
        - manual review and compatibility obligations are explicit rather than silently treated as passed
    evidence:
      contracts:
        - verification/contracts/gate_rms_change.md
  - id: build-context-packet-command
    symbol: print_context_packet
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/build-context-packet.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
    assumptions:
      ensures:
        - context packets are bounded to canonical module references and working rules
        - context packets include route evidence when task text targets a composite parent or recursive module tree
    evidence:
      scenarios:
        - verification/scenarios/context_packet.md
  - id: build-module-atlas-command
    symbol: run_atlas
    kind: projector
    purity: effectful
    discharges:
      contracts:
        - contracts/build-module-atlas.v1.yaml
      invariants:
        - canonical-artifacts-remain-authoritative
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - atlas graph nodes, edges, semantic contract clauses, contract-flow readings, trace projections, gaps, confidence labels, source references, and generated HTML are derived from the target module manifest and referenced artifacts
        - stable semantic identifiers allow future live and diff views to reconcile changes without inventing topology
    evidence:
      contracts:
        - verification/contracts/build_module_atlas.md
        - verification/contracts/build_module_atlas_question_audit.md
  - id: package-module-command
    symbol: run_package
    kind: adapter
    purity: effectful
    discharges:
      contracts:
        - contracts/package-module.v1.yaml
      invariants:
        - diagnostics-are-evidence-not-authority
    assumptions:
      ensures:
        - package contents are derived from referenced module artifacts and package metadata
    evidence:
      scenarios:
        - verification/scenarios/package_module.md
  - id: verify-implementation-command
    symbol: run_verify
    kind: interpreter
    purity: effectful
    discharges:
      contracts:
        - contracts/verify-implementation.v1.yaml
    assumptions:
      requires:
        - target is an implementation binding with commands.verify or a composite module manifest
      ensures:
        - the declared verification command is run from the implementation binding directory
        - composite module verification rolls up manifest validation, composition, parent scenario evidence, and contained child implementation verification
    evidence:
      scenarios:
        - verification/scenarios/verify_implementation.md
